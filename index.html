<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Signal Runner</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #10151b;
      --panel: #1a252b;
      --panel-2: #24313a;
      --text: #eef5f3;
      --muted: #a8b8b5;
      --green: #60d394;
      --amber: #f6c85f;
      --cyan: #65d5ff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      min-height: 100%;
      display: grid;
      place-items: center;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    main {
      width: min(100vw, 1160px);
      padding: 16px;
    }

    .shell {
      display: grid;
      gap: 10px;
    }

    .topbar {
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 4px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.45rem, 4vw, 2.15rem);
      font-weight: 800;
      letter-spacing: 0;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--muted);
      font-size: 0.95rem;
      white-space: nowrap;
    }

    .status strong {
      color: var(--text);
      font-weight: 760;
    }

    .game-frame {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 10;
      min-height: 330px;
      max-height: calc(100vh - 108px);
      overflow: hidden;
      border: 1px solid rgba(238, 245, 243, 0.18);
      border-radius: 8px;
      background: #0e151a;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.42);
      isolation: isolate;
    }

    #sceneHost {
      position: absolute;
      inset: 0;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: rgba(10, 16, 20, 0.62);
      backdrop-filter: blur(4px);
      z-index: 2;
    }

    .overlay[hidden] {
      display: none;
    }

    .menu {
      width: min(540px, 100%);
      display: grid;
      justify-items: center;
      gap: 16px;
      text-align: center;
    }

    .menu h2 {
      margin: 0;
      font-size: clamp(2.25rem, 8vw, 4.8rem);
      line-height: 0.92;
      letter-spacing: 0;
    }

    .menu p {
      margin: 0;
      max-width: 36rem;
      color: var(--muted);
      font-size: clamp(1rem, 2.4vw, 1.15rem);
      line-height: 1.5;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 7px;
    }

    .dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      display: inline-block;
      background: var(--cyan);
      box-shadow: 0 0 12px rgba(101, 213, 255, 0.9);
    }

    .dot.target {
      background: var(--amber);
      box-shadow: 0 0 12px rgba(246, 200, 95, 0.9);
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-top: 4px;
    }

    button {
      min-width: 134px;
      min-height: 44px;
      border: 1px solid rgba(238, 245, 243, 0.22);
      border-radius: 8px;
      background: var(--panel-2);
      color: var(--text);
      font: inherit;
      font-weight: 760;
      letter-spacing: 0;
      cursor: pointer;
    }

    button.primary {
      border-color: rgba(96, 211, 148, 0.9);
      background: var(--green);
      color: #082314;
    }

    button:focus-visible {
      outline: 3px solid var(--cyan);
      outline-offset: 2px;
    }

    .load-error {
      position: absolute;
      inset: auto 18px 18px 18px;
      z-index: 3;
      padding: 12px 14px;
      border: 1px solid rgba(246, 200, 95, 0.5);
      border-radius: 8px;
      background: rgba(28, 22, 12, 0.92);
      color: #ffe5a1;
      font-size: 0.92rem;
      line-height: 1.4;
    }

    .load-error[hidden] {
      display: none;
    }

    @media (max-width: 720px) {
      body {
        overflow: auto;
      }

      main {
        padding: 10px;
      }

      .topbar {
        min-height: 78px;
        align-items: flex-start;
        flex-direction: column;
      }

      .status {
        white-space: normal;
        flex-wrap: wrap;
      }

      .game-frame {
        min-height: 420px;
        max-height: none;
        aspect-ratio: 4 / 5;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="shell">
      <div class="topbar" aria-live="polite">
        <h1>Signal Runner</h1>
        <div class="status">
          <span>Status: <strong id="statusText">Awaiting launch</strong></span>
          <span>Target: <strong>Dock 01</strong></span>
        </div>
      </div>

      <section class="game-frame" aria-label="Signal Runner 3D game">
        <div id="sceneHost"></div>
        <div class="load-error" id="loadError" hidden>
          Three.js did not initialize. Reload the page.
        </div>

        <div class="overlay" id="startOverlay">
          <div class="menu">
            <h2>Signal Runner</h2>
            <p>Pilot the courier drone through the 3D city grid and dock at the active relay.</p>
            <div class="legend" aria-hidden="true">
              <span><i class="dot"></i> Courier drone</span>
              <span><i class="dot target"></i> Dock 01</span>
            </div>
            <div class="button-row">
              <button class="primary" id="startButton" type="button">Start Run</button>
            </div>
          </div>
        </div>

        <div class="overlay" id="winOverlay" hidden>
          <div class="menu">
            <h2>Delivered</h2>
            <p>The courier reached Dock 01.</p>
            <div class="button-row">
              <button class="primary" id="restartButton" type="button">Run Again</button>
            </div>
          </div>
        </div>
      </section>
    </div>
  </main>

    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x10151b);
      scene.fog = new THREE.Fog(0x10151b, 24, 48);

      camera = new THREE.PerspectiveCamera(42, 1, 0.1, 100);
      camera.position.set(0, 17, 18);
      camera.lookAt(0, 0, 0);

      renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true, powerPreference: "high-performance" });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      host.appendChild(renderer.domElement);

      addLights();
      addGround();
      addBounds();
      addWalls();
      addTarget();
      addPlayer();
      addLabels();
      resize();

      window.addEventListener("resize", resize);
      window.addEventListener("keydown", onKeyDown);
      window.addEventListener("keyup", onKeyUp);
      window.addEventListener("blur", () => keys.clear());
      startButton.addEventListener("click", startRun);
      restartButton.addEventListener("click", startRun);
      loadError.hidden = true;

    function addLights() {
      const ambient = new THREE.HemisphereLight(0xc9f2ff, 0x17221b, 1.6);
      scene.add(ambient);

      const key = new THREE.DirectionalLight(0xffffff, 2.1);
      key.position.set(-8, 14, 8);
      key.castShadow = true;
      key.shadow.mapSize.set(2048, 2048);
      key.shadow.camera.left = -18;
      key.shadow.camera.right = 18;
      key.shadow.camera.top = 14;
      key.shadow.camera.bottom = -14;
      scene.add(key);

      const dockLight = new THREE.PointLight(0xf6c85f, 2.4, 9);
      dockLight.position.set(target.x, 2.2, target.z);
      scene.add(dockLight);
    }

    function addGround() {
      const ground = new THREE.Mesh(
        new THREE.BoxGeometry(WORLD.width, 0.18, WORLD.depth),
        new THREE.MeshStandardMaterial({ color: 0x172029, roughness: 0.84, metalness: 0.05 })
      );
      ground.position.y = -0.1;
      ground.receiveShadow = true;
      scene.add(ground);

      const grid = new THREE.GridHelper(WORLD.width, 28, 0x36505b, 0x273840);
      grid.position.y = 0.012;
      scene.add(grid);

      const route = new THREE.Line(
        new THREE.BufferGeometry().setFromPoints([
          new THREE.Vector3(startPosition.x, 0.04, startPosition.z),
          new THREE.Vector3(-12.7, 0.04, -7.1),
          new THREE.Vector3(11.2, 0.04, -7.1),
          new THREE.Vector3(target.x, 0.04, target.z)
        ]),
        new THREE.LineDashedMaterial({ color: 0x65d5ff, dashSize: 0.55, gapSize: 0.34, transparent: true, opacity: 0.55 })
      );
      route.computeLineDistances();
      scene.add(route);
    }

    function addBounds() {
      const material = new THREE.MeshStandardMaterial({ color: 0x30404a, roughness: 0.78, metalness: 0.08 });
      const specs = [
        { x: 0, z: WORLD.minZ - 0.35, w: WORLD.width + 0.7, d: 0.7 },
        { x: 0, z: WORLD.maxZ + 0.35, w: WORLD.width + 0.7, d: 0.7 },
        { x: WORLD.minX - 0.35, z: 0, w: 0.7, d: WORLD.depth },
        { x: WORLD.maxX + 0.35, z: 0, w: 0.7, d: WORLD.depth }
      ];

      for (const spec of specs) {
        const mesh = new THREE.Mesh(new THREE.BoxGeometry(spec.w, 1.2, spec.d), material);
        mesh.position.set(spec.x, 0.6, spec.z);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        scene.add(mesh);
      }
    }

    function addWalls() {
      for (const wall of walls) {
        const mesh = new THREE.Mesh(
          new THREE.BoxGeometry(wall.w, wall.h, wall.d),
          new THREE.MeshStandardMaterial({ color: 0x53626a, roughness: 0.62, metalness: 0.12 })
        );
        mesh.position.set(wall.x, wall.h / 2, wall.z);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        scene.add(mesh);

        const cap = new THREE.Mesh(
          new THREE.BoxGeometry(wall.w + 0.05, 0.08, wall.d + 0.05),
          new THREE.MeshStandardMaterial({ color: 0x78909a, emissive: 0x0f1f24, roughness: 0.45 })
        );
        cap.position.set(wall.x, wall.h + 0.045, wall.z);
        cap.castShadow = true;
        scene.add(cap);
      }
    }

        new THREE.MeshStandardMaterial({ color: 0xf6c85f, emissive: 0x9b6d10, emissiveIntensity: 0.9, roughness: 0.38 })
      );
      targetCore.position.y = 0.42;
      targetCore.castShadow = true;
      group.add(targetCore);

      targetBeacon = new THREE.Mesh(
        new THREE.TorusGeometry(target.radius * 1.1, 0.035, 12, 72),
        new THREE.MeshBasicMaterial({ color: 0xf6c85f })
      );
      targetBeacon.position.y = 0.85;
      targetBeacon.rotation.x = Math.PI / 2;
      group.add(targetBeacon);

      scene.add(group);
    }

    function addPlayer() {
      playerGroup = new THREE.Group();
      playerGroup.position.copy(startPosition);

      droneRing = new THREE.Mesh(
        new THREE.TorusGeometry(0.48, 0.055, 12, 48),
        new THREE.MeshStandardMaterial({ color: 0x65d5ff, emissive: 0x123f52, emissiveIntensity: 0.65, roughness: 0.3 })
      );
      droneRing.rotation.x = Math.PI / 2;
      droneRing.castShadow = true;
      playerGroup.add(droneRing);

      droneBody = new THREE.Mesh(
        new THREE.BoxGeometry(0.7, 0.26, 0.9),
        new THREE.MeshStandardMaterial({ color: 0x65d5ff, emissive: 0x092f3d, emissiveIntensity: 0.55, roughness: 0.36 })
      );
      droneBody.position.y = 0.05;
      droneBody.castShadow = true;
      playerGroup.add(droneBody);

      const nose = new THREE.Mesh(
        new THREE.ConeGeometry(0.18, 0.36, 24),
        new THREE.MeshStandardMaterial({ color: 0xeef5f3, roughness: 0.34 })
      );
      nose.position.set(0, 0.05, -0.6);
      nose.rotation.x = Math.PI / 2;
      nose.castShadow = true;
      playerGroup.add(nose);

      const rotorMaterial = new THREE.MeshStandardMaterial({ color: 0x60d394, emissive: 0x123a21, emissiveIntensity: 0.55 });
      const rotorPositions = [
        [-0.55, 0.02, -0.45],
        [0.55, 0.02, -0.45],
        [-0.55, 0.02, 0.45],
        [0.55, 0.02, 0.45]
      ];
      for (const [x, y, z] of rotorPositions) {
        const rotor = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 0.05, 20), rotorMaterial);
        rotor.position.set(x, y, z);
        rotor.castShadow = true;
        playerGroup.add(rotor);
      }

      scene.add(playerGroup);
    }

    function addLabels() {
      scene.add(makeLabel("START", -12.2, 0.04, 8.25, 1.35));
      scene.add(makeLabel("DOCK 01", target.x, 0.06, target.z - 1.55, 1.45));
    }

    function makeLabel(text, x, y, z, scale) {
      const canvas = document.createElement("canvas");
      canvas.width = 512;
      canvas.height = 128;
      const ctx = canvas.getContext("2d");
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "rgba(12, 18, 22, 0.75)";
      ctx.fillRect(18, 22, 476, 84);
      ctx.strokeStyle = "rgba(238, 245, 243, 0.36)";
      ctx.lineWidth = 4;
      ctx.strokeRect(18, 22, 476, 84);
      ctx.fillStyle = "#eef5f3";
      ctx.font = "700 54px system-ui, sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(text, 256, 64);

      const texture = new THREE.CanvasTexture(canvas);
      texture.colorSpace = THREE.SRGBColorSpace;
      const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: texture, transparent: true }));
      sprite.position.set(x, y + 0.08, z);
      sprite.scale.set(scale * 2.6, scale * 0.65, 1);
      return sprite;
    }

    function startRun() {
      state = "playing";
      keys.clear();
      statusText.textContent = "In transit";
      startOverlay.hidden = true;
      winOverlay.hidden = true;
      playerGroup.position.copy(startPosition);
      playerGroup.rotation.y = 0;
    }

    function finishRun() {
      state = "won";
      keys.clear();
      statusText.textContent = "Delivered";
      winOverlay.hidden = false;
      restartButton.focus();
    }

    function onKeyDown(event) {
      const movementKey = ["ArrowLeft", "ArrowRight", "ArrowUp", "ArrowDown", "KeyA", "KeyD", "KeyW", "KeyS"].includes(event.code);
      if (movementKey) {
        event.preventDefault();
        keys.add(event.code);
      }

      if ((event.code === "Enter" || event.code === "Space") && state !== "playing") {
        event.preventDefault();
        startRun();
      }
    }

    function onKeyUp(event) {
      keys.delete(event.code);
    }

    function updatePlayer(dt) {
      let dx = 0;
      let dz = 0;

      if (keys.has("ArrowLeft") || keys.has("KeyA")) dx -= 1;
      if (keys.has("ArrowRight") || keys.has("KeyD")) dx += 1;
      if (keys.has("ArrowUp") || keys.has("KeyW")) dz -= 1;
      if (keys.has("ArrowDown") || keys.has("KeyS")) dz += 1;

      if (dx === 0 && dz === 0) return;

      const length = Math.hypot(dx, dz);
      dx /= length;
      dz /= length;

      const step = PLAYER_SPEED * dt;
      tryMove(dx * step, 0);
      tryMove(0, dz * step);

      const heading = Math.atan2(dx, dz);
      playerGroup.rotation.y = heading;

      const distanceToTarget = Math.hypot(playerGroup.position.x - target.x, playerGroup.position.z - target.z);
      if (distanceToTarget <= target.radius + PLAYER_RADIUS * 0.45) {
        finishRun();
      }
    }

    function tryMove(dx, dz) {
      const next = {
        x: THREE.MathUtils.clamp(playerGroup.position.x + dx, WORLD.minX + PLAYER_RADIUS, WORLD.maxX - PLAYER_RADIUS),
        z: THREE.MathUtils.clamp(playerGroup.position.z + dz, WORLD.minZ + PLAYER_RADIUS, WORLD.maxZ - PLAYER_RADIUS)
      };

      if (!hitsWall(next.x, next.z)) {
        playerGroup.position.x = next.x;
        playerGroup.position.z = next.z;
      }
    }

    function hitsWall(x, z) {
      return walls.some((wall) => {
        const halfW = wall.w / 2 + PLAYER_RADIUS;
        const halfD = wall.d / 2 + PLAYER_RADIUS;
        return x > wall.x - halfW && x < wall.x + halfW && z > wall.z - halfD && z < wall.z + halfD;
      });
    }

    function resize() {
      const rect = host.getBoundingClientRect();
      const width = Math.max(1, rect.width);
      const height = Math.max(1, rect.height);
      camera.aspect = width / height;
      camera.updateProjectionMatrix();
      renderer.setSize(width, height, false);
    }

    function animate() {
      requestAnimationFrame(animate);
      const dt = Math.min(clock.getDelta(), 0.033);
      const time = clock.elapsedTime;

      if (state === "playing") {
        updatePlayer(dt);
      } else if (state === "title") {
        playerGroup.position.y = startPosition.y + Math.sin(time * 2.2) * 0.08;
      }

      droneRing.rotation.z += dt * 3.8;
      targetBeacon.rotation.z += dt * 1.4;
      targetBeacon.scale.setScalar(1 + Math.sin(time * 3.2) * 0.08);
      targetCore.position.y = 0.42 + Math.sin(time * 3.2) * 0.05;

      renderer.render(scene, camera);
    }
  </script>
</body>
</html>
